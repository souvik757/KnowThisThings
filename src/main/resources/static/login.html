<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — KnowThisThings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e; --surface: #161616; --border: #2a2a2a; --border-hi: #3f3f3f;
      --ink: #e8e4dc; --ink-muted: #7a7570; --ink-faint: #3a3835; --accent: #c8a96e;
      --accent-dim: #6b5832; --red: #c0392b; --green: #2ecc71;
      --font-head: 'DM Serif Display', Georgia, serif; --font-body: 'Lato', sans-serif;
      --font-mono: 'DM Mono', monospace; --radius: 6px;
    }
    html { font-size: 15px; }
    body { background: var(--bg); color: var(--ink); font-family: var(--font-body);
           font-weight: 300; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: .5;
    }
    .login-container { position: relative; z-index: 1; background: var(--surface);
                       border: 1px solid var(--border); border-radius: var(--radius);
                       padding: 3rem 2.5rem; width: 100%; max-width: 420px;
                       box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4); }
    .login-header { margin-bottom: 2.5rem; text-align: center; }
    .logo { font-family: var(--font-head); font-size: 1.8rem; letter-spacing: .03em;
            color: var(--ink); display: flex; align-items: center; justify-content: center;
            gap: .6rem; margin-bottom: 0.5rem; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .login-header p { color: var(--ink-muted); font-size: 0.9rem; margin-top: 0.5rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; margin-bottom: .5rem; font-size: .9rem; color: var(--ink); font-weight: 400; }
    .form-group input { width: 100%; padding: .8rem; background: var(--bg); border: 1px solid var(--border);
                        color: var(--ink); border-radius: var(--radius); font-family: var(--font-body);
                        font-size: .9rem; transition: border-color .2s; }
    .form-group input:focus { outline: none; border-color: var(--accent); }
    .error-message { color: var(--red); font-size: .8rem; margin-top: .3rem; }
    .success-message { color: var(--green); font-size: .8rem; margin-top: .3rem; }
    #loginMessage { margin-bottom: 1rem; text-align: center; }
    .btn { width: 100%; padding: .8rem; margin-top: 1rem; background: var(--accent);
           color: var(--bg); border: none; border-radius: var(--radius); cursor: pointer;
           font-family: var(--font-body); font-size: .9rem; font-weight: 400;
           transition: background .2s; }
    .btn:hover { background: var(--accent-dim); }
    .btn:disabled { background: var(--ink-muted); cursor: not-allowed; }
    .login-footer { text-align: center; margin-top: 1.5rem; font-size: .85rem; color: var(--ink-muted); }
    .login-footer a { color: var(--accent); text-decoration: none; transition: color .2s; }
    .login-footer a:hover { color: var(--ink); text-decoration: underline; }
    .loading { display: inline-block; width: 8px; height: 8px; background: var(--bg);
               border-radius: 50%; animation: pulse 1.5s infinite; margin-right: .3rem; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @media (max-width: 480px) {
      .login-container { padding: 2rem 1.5rem; }
      .logo { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="logo">
        <span class="logo-dot"></span>
        KnowThisThings
      </div>
      <p>Your Personal Journal Hub</p>
    </div>
    <div id="loginMessage"></div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Username *</label>
        <input type="text" id="username" required placeholder="Enter your username" autocomplete="username">
      </div>
      <button type="submit" class="btn" id="loginBtn">Login</button>
    </form>
    <div class="login-footer">
      Don't have an account? <a href="signup.html">Sign up here</a>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8080/api';
    document.addEventListener('DOMContentLoaded', () => {
      // Check if already logged in
      const username = localStorage.getItem('username');
      const currentUser = localStorage.getItem('currentUser');
      
      if (username && currentUser) {
        window.location.href = 'index.html';
        return;
      }
      
      // Setup login form
      document.getElementById('username').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin(e);
      });
    });

    async function handleLogin(event) {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const messageDiv = document.getElementById('loginMessage');
      const btn = document.getElementById('loginBtn');
      if (!username) {
        messageDiv.innerHTML = '<p class="error-message">Please enter a username</p>';
        return;
      }
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>Logging in...';
      messageDiv.innerHTML = '';
      try {
        const response = await fetch(`${API_BASE}/users/username/${username}`, {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' }
        });
        if (!response.ok) {
          if (response.status === 404) {
            messageDiv.innerHTML = '<p class="error-message">❌ User not found. Please sign up first.</p>';
          } else {
            messageDiv.innerHTML = '<p class="error-message">❌ Login failed. Please try again.</p>';
          }
          btn.disabled = false;
          btn.innerHTML = 'Login';
          return;
        }
        const user = await response.json();
        localStorage.setItem('username', user.username);
        localStorage.setItem('currentUser', JSON.stringify(user));
        sessionStorage.setItem('username', user.username);
        messageDiv.innerHTML = '<p class="success-message">✓ Login successful! Redirecting...</p>';
        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
      } catch (error) {
        console.error('Login error:', error);
        messageDiv.innerHTML = '<p class="error-message">❌ Connection error. Please try again.</p>';
        btn.disabled = false;
        btn.innerHTML = 'Login';
      }
    }
  </script>
</body>
</html>
