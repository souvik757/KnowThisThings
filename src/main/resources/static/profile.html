<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — KnowThisThings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset & base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0e0e;
      --surface:   #161616;
      --border:    #2a2a2a;
      --border-hi: #3f3f3f;
      --ink:       #e8e4dc;
      --ink-muted: #7a7570;
      --ink-faint: #3a3835;
      --accent:    #c8a96e;
      --accent-dim:#6b5832;
      --red:       #c0392b;
      --green:     #2ecc71;
      --font-head: 'DM Serif Display', Georgia, serif;
      --font-body: 'Lato', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --radius:    6px;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Grain overlay ────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: .5;
    }

    /* ── Header ───────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
    }

    .logo {
      font-family: var(--font-head);
      font-size: 1.25rem;
      letter-spacing: .03em;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .logo-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .username-display {
      font-size: 0.85rem;
      color: var(--ink-muted);
    }

    .btn {
      padding: .5rem 1rem;
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: .8rem;
      font-weight: 400;
      letter-spacing: .05em;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #0e0e0e;
      border-color: var(--accent);
    }

    .btn-primary:hover {
      background: #d4b87a;
    }

    .btn-secondary {
      background: transparent;
      color: var(--ink-muted);
      border-color: var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--border-hi);
      color: var(--ink);
    }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border-color: var(--red);
    }

    .btn-danger:hover {
      background: var(--red);
      color: #fff;
    }

    /* ── Main content ─────────────────────────────────── */
    .main {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
    }

    /* ── Section title ───────────────────────────────── */
    .section-title {
      font-family: var(--font-head);
      font-size: 1.6rem;
      font-weight: 400;
      font-style: italic;
      color: var(--ink);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: .8rem;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── User info card ───────────────────────────────── */
    .user-info-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .user-info {
      flex: 1;
    }

    .user-info h2 {
      font-family: var(--font-head);
      font-size: 1.3rem;
      color: var(--ink);
      margin-bottom: 0.3rem;
    }

    .user-info p {
      color: var(--ink-muted);
      font-size: 0.85rem;
    }

    .user-actions {
      display: flex;
      gap: 0.6rem;
    }

    /* ── Loading state ────────────────────────────────── */
    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--ink-muted);
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid rgba(232, 228, 220, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Empty state ──────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-top: 1rem;
    }

    .empty-state h3 {
      font-family: var(--font-head);
      font-size: 1.2rem;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    .empty-state p {
      color: var(--ink-muted);
      margin-bottom: 1.5rem;
    }

    /* ── Journal cards grid ───────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    .journal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem;
      transition: all .2s;
      display: flex;
      flex-direction: column;
      height: 100%;
      cursor: pointer;
    }

    .journal-card:hover {
      border-color: var(--accent);
      background: linear-gradient(to bottom, var(--surface), rgba(200, 169, 110, 0.02));
    }

    .journal-card-title {
      font-family: var(--font-head);
      font-size: 1.1rem;
      font-style: italic;
      color: var(--ink);
      margin-bottom: 0.6rem;
      word-break: break-word;
    }

    .journal-card-preview {
      color: var(--ink-muted);
      font-size: 0.85rem;
      line-height: 1.5;
      margin-bottom: 0.8rem;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .journal-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--ink-faint);
      padding-top: 0.8rem;
      border-top: 1px solid var(--border);
      margin-bottom: 0.8rem;
    }

    .journal-card-tags {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 0.8rem;
    }

    .tag {
      background: rgba(200, 169, 110, 0.15);
      color: var(--accent);
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
      font-size: 0.7rem;
      font-family: var(--font-mono);
    }

    .card-actions {
      display: flex;
      gap: 0.4rem;
      justify-content: flex-end;
    }

    .card-actions button {
      flex: 1;
      padding: 0.4rem 0.6rem;
      font-size: 0.7rem;
      border-radius: var(--radius);
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink-muted);
      transition: all .15s;
    }

    .card-actions .btn-delete:hover {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    .card-actions .btn-view:hover {
      background: transparent;
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Create journal section ────────────────────────── */
    .create-journal-btn {
      margin-bottom: 1.5rem;
    }

    /* ── Modal ────────────────────────────────────────── */
    .modal {
      display: none;
      position: fixed;
      z-index: 500;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(14, 14, 14, 0.8);
      overflow-y: auto;
    }

    .modal.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    .modal-header h2 {
      font-family: var(--font-head);
      font-size: 1.4rem;
      color: var(--ink);
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--ink-muted);
      font-size: 1.5rem;
      cursor: pointer;
    }

    .close-btn:hover {
      color: var(--ink);
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: .4rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--ink);
      padding: .65rem .9rem;
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: .9rem;
      font-weight: 300;
      outline: none;
      transition: border-color .2s;
    }

    .form-group textarea {
      min-height: 200px;
      resize: vertical;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
    }

    .modal-footer {
      display: flex;
      gap: 0.6rem;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .modal-footer button {
      flex: 1;
    }

    /* ── Error/Success messages ───────────────────────── */
    .alert {
      padding: 0.8rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      font-size: 0.85rem;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-error {
      background: #3a1a1a;
      border: 1px solid var(--red);
      color: var(--red);
    }

    .alert-success {
      background: #1a3626;
      border: 1px solid var(--green);
      color: var(--green);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <span>KnowThisThings</span>
      <div class="logo-dot"></div>
    </div>
    <div class="header-actions">
      <span class="username-display" id="usernameDisplay"></span>
      <button class="btn btn-secondary" id="backBtn">Browse</button>
      <button class="btn btn-danger" id="logoutBtn">Logout</button>
    </div>
  </header>

  <div class="main">
    <div class="alert alert-error" id="errorAlert"></div>
    <div class="alert alert-success" id="successAlert"></div>

    <div class="user-info-card">
      <div class="user-info">
        <h2 id="userFullName">Welcome</h2>
        <p id="userJournalCount">Loading...</p>
      </div>
      <div class="user-actions">
        <button class="btn btn-primary" id="createJournalBtn">Create Journal</button>
      </div>
    </div>

    <h3 class="section-title">Your Journals</h3>

    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <p>Loading your journals...</p>
    </div>

    <div id="journalsContainer" style="display: none;">
      <div class="cards-grid" id="journalsGrid"></div>
    </div>

    <div class="empty-state" id="emptyState" style="display: none;">
      <h3>No journals yet</h3>
      <p>Start journaling your thoughts and discoveries today</p>
      <button class="btn btn-primary" id="emptyStateCreateBtn">Create Your First Journal</button>
    </div>
  </div>

  <!-- Create/Edit Journal Modal -->
  <div class="modal" id="journalModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Create Journal</h2>
        <button class="close-btn" id="closeModalBtn">&times;</button>
      </div>

      <div class="alert alert-error" id="modalErrorAlert"></div>

      <form id="journalForm">
        <div class="form-group">
          <label for="journalTitle">Title</label>
          <input
            type="text"
            id="journalTitle"
            name="title"
            placeholder="Enter journal title"
            required
          />
        </div>

        <div class="form-group">
          <label for="journalContent">Content</label>
          <textarea
            id="journalContent"
            name="content"
            placeholder="Write your journal entry..."
            required
          ></textarea>
        </div>

        <div class="form-group">
          <label for="journalTags">Tags (comma-separated)</label>
          <input
            type="text"
            id="journalTags"
            name="tags"
            placeholder="e.g., reflection, thoughts, goals"
          />
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="submitJournalBtn">Save Journal</button>
        </div>
      </form>
    </div>
  </div>

  <!-- View Journal Modal -->
  <div class="modal" id="viewModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="viewTitle"></h2>
        <button class="close-btn" id="closeViewBtn">&times;</button>
      </div>

      <div id="viewContent"></div>

      <div class="modal-footer">
        <button class="btn btn-secondary" id="editBtn">Edit</button>
        <button class="btn btn-danger" id="deleteBtn">Delete</button>
        <button class="btn btn-ghost" id="closeViewBtn2">Close</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'http://localhost:8081/api';
    let currentUser = null;
    let currentUsername = null;
    let editingJournalId = null;

    // Initialize page
    window.addEventListener('load', () => {
      const storedUser = localStorage.getItem('currentUser');
      const storedUsername = localStorage.getItem('username');

      if (!storedUser || !storedUsername) {
        window.location.href = '/login.html';
        return;
      }

      currentUser = JSON.parse(storedUser);
      currentUsername = storedUsername;

      document.getElementById('usernameDisplay').textContent = currentUsername;
      document.getElementById('userFullName').textContent = `Welcome, ${currentUsername}!`;

      loadUserJournals();
    });

    // Load user journals
    async function loadUserJournals() {
      try {
        const response = await fetch(`${API_BASE_URL}/journal-entries/${currentUsername}`);
        
        if (!response.ok) {
          throw new Error('Failed to load journals');
        }

        const data = await response.json();
        const journals = data || [];

        document.getElementById('loadingState').style.display = 'none';

        if (journals.length === 0) {
          document.getElementById('emptyState').style.display = 'block';
          document.getElementById('journalsContainer').style.display = 'none';
          document.getElementById('userJournalCount').textContent = 'No journals created yet';
        } else {
          document.getElementById('emptyState').style.display = 'none';
          document.getElementById('journalsContainer').style.display = 'block';
          document.getElementById('userJournalCount').textContent = `${journals.length} journal${journals.length !== 1 ? 's' : ''} created`;

          renderJournals(journals);
        }
      } catch (error) {
        console.error('Error loading journals:', error);
        document.getElementById('loadingState').style.display = 'none';
        showAlert('Error loading journals', 'error');
      }
    }

    // Render journals
    function renderJournals(journals) {
      const grid = document.getElementById('journalsGrid');
      grid.innerHTML = '';

      journals.forEach(journal => {
        const card = document.createElement('div');
        card.className = 'journal-card';
        
        const date = new Date(journal.dateCreated).toLocaleDateString();
        const tagsHtml = journal.tags && journal.tags.length > 0
          ? journal.tags.map(tag => `<span class="tag">${tag}</span>`).join('')
          : '';

        card.innerHTML = `
          <div class="journal-card-title">${escapeHtml(journal.title)}</div>
          <div class="journal-card-preview">${escapeHtml(journal.content.substring(0, 150))}...</div>
          ${tagsHtml ? `<div class="journal-card-tags">${tagsHtml}</div>` : ''}
          <div class="journal-card-meta">
            <span>${date}</span>
            <span>Views: ${journal.viewCount || 0}</span>
          </div>
          <div class="card-actions">
            <button class="btn-view" onclick="viewJournal('${journal.id}')">View</button>
            <button class="btn-delete" onclick="deleteJournal('${journal.id}')">Delete</button>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    // View journal
    async function viewJournal(journalId) {
      try {
        const response = await fetch(`${API_BASE_URL}/journal-entries/${journalId}`);
        
        if (!response.ok) {
          throw new Error('Failed to load journal');
        }

        const journal = await response.json();
        
        document.getElementById('viewTitle').textContent = journal.title;
        document.getElementById('viewContent').innerHTML = `
          <p style="color: var(--ink-muted); font-size: 0.85rem; margin-bottom: 1rem;">
            Created: ${new Date(journal.dateCreated).toLocaleString()}
          </p>
          <div style="white-space: pre-wrap; line-height: 1.6; margin-bottom: 1rem;">
            ${escapeHtml(journal.content)}
          </div>
          ${journal.tags && journal.tags.length > 0 ? `
            <div style="border-top: 1px solid var(--border); padding-top: 1rem;">
              <strong style="color: var(--ink-muted); font-size: 0.85rem;">Tags:</strong>
              <div style="display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.5rem;">
                ${journal.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
              </div>
            </div>
          ` : ''}
        `;

        editingJournalId = journalId;
        document.getElementById('viewModal').classList.add('show');
      } catch (error) {
        console.error('Error loading journal:', error);
        showAlert('Failed to load journal', 'error');
      }
    }

    // Delete journal
    async function deleteJournal(journalId) {
      if (!confirm('Are you sure you want to delete this journal?')) {
        return;
      }

      try {
        const response = await fetch(`${API_BASE_URL}/journal-entries/${currentUsername}/${journalId}`, {
          method: 'DELETE'
        });

        if (!response.ok) {
          throw new Error('Failed to delete journal');
        }

        showAlert('Journal deleted successfully', 'success');
        closeViewModal();
        loadUserJournals();
      } catch (error) {
        console.error('Error deleting journal:', error);
        showAlert('Failed to delete journal', 'error');
      }
    }

    // Open create journal modal
    function openCreateModal() {
      editingJournalId = null;
      document.getElementById('modalTitle').textContent = 'Create Journal';
      document.getElementById('journalForm').reset();
      document.getElementById('journalModal').classList.add('show');
    }

    // Close modal
    function closeModal() {
      document.getElementById('journalModal').classList.remove('show');
      editingJournalId = null;
    }

    function closeViewModal() {
      document.getElementById('viewModal').classList.remove('show');
      editingJournalId = null;
    }

    // Submit journal form
    document.getElementById('journalForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const title = document.getElementById('journalTitle').value.trim();
      const content = document.getElementById('journalContent').value.trim();
      const tagsInput = document.getElementById('journalTags').value.trim();
      const tags = tagsInput ? tagsInput.split(',').map(t => t.trim()) : [];

      if (!title || !content) {
        showModalAlert('Please fill in all required fields', 'error');
        return;
      }

      const journalData = {
        title,
        content,
        tags
      };

      try {
        let response;

        if (editingJournalId) {
          // Update existing journal
          response = await fetch(`${API_BASE_URL}/journal-entries/${currentUsername}/${editingJournalId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(journalData)
          });
        } else {
          // Create new journal
          response = await fetch(`${API_BASE_URL}/journal-entries/${currentUsername}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(journalData)
          });
        }

        if (!response.ok) {
          throw new Error('Failed to save journal');
        }

        showAlert(editingJournalId ? 'Journal updated successfully' : 'Journal created successfully', 'success');
        closeModal();
        loadUserJournals();
      } catch (error) {
        console.error('Error saving journal:', error);
        showModalAlert('Failed to save journal', 'error');
      }
    });

    // Event listeners
    document.getElementById('createJournalBtn').addEventListener('click', openCreateModal);
    document.getElementById('emptyStateCreateBtn').addEventListener('click', openCreateModal);
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('cancelBtn').addEventListener('click', closeModal);
    document.getElementById('closeViewBtn').addEventListener('click', closeViewModal);
    document.getElementById('closeViewBtn2').addEventListener('click', closeViewModal);
    document.getElementById('editBtn').addEventListener('click', () => {
      closeViewModal();
      // Populate form with journal data for editing
      // This would require fetching the data again or storing it
      alert('Edit functionality to be implemented');
    });

    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = '/index.html';
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.clear();
      window.location.href = '/login.html';
    });

    // Close modals when clicking outside
    window.addEventListener('click', (e) => {
      const journalModal = document.getElementById('journalModal');
      const viewModal = document.getElementById('viewModal');

      if (e.target === journalModal) {
        closeModal();
      }
      if (e.target === viewModal) {
        closeViewModal();
      }
    });

    // Utility functions
    function showAlert(message, type) {
      const alert = document.getElementById(type === 'error' ? 'errorAlert' : 'successAlert');
      alert.textContent = message;
      alert.classList.add('show');

      setTimeout(() => {
        alert.classList.remove('show');
      }, 4000);
    }

    function showModalAlert(message, type) {
      const alert = document.getElementById('modalErrorAlert');
      alert.textContent = message;
      alert.classList.add('show');

      setTimeout(() => {
        alert.classList.remove('show');
      }, 4000);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
