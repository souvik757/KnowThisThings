<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — KnowThisThings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset & base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0e0e;
      --surface:   #161616;
      --border:    #2a2a2a;
      --border-hi: #3f3f3f;
      --ink:       #e8e4dc;
      --ink-muted: #7a7570;
      --ink-faint: #3a3835;
      --accent:    #c8a96e;
      --accent-dim:#6b5832;
      --red:       #c0392b;
      --green:     #2ecc71;
      --font-head: 'DM Serif Display', Georgia, serif;
      --font-body: 'Lato', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --radius:    6px;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Grain overlay ────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: .5;
    }

    /* ── Signup container ─────────────────────────────── */
    .signup-container {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .signup-header {
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .logo {
      font-family: var(--font-head);
      font-size: 1.8rem;
      letter-spacing: .03em;
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      margin-bottom: 0.5rem;
    }

    .logo-dot { 
      width: 8px; height: 8px; 
      border-radius: 50%; 
      background: var(--accent); 
    }

    .signup-header p {
      color: var(--ink-muted);
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    /* ── Form ────────────────────────────────────────── */
    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: .6rem;
    }

    .form-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--ink);
      padding: .8rem .95rem;
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: .95rem;
      font-weight: 300;
      outline: none;
      transition: border-color .2s;
    }

    .form-group input:focus {
      border-color: var(--accent);
    }

    .form-group input::placeholder {
      color: var(--ink-faint);
    }

    /* ── Password strength indicator ──────────────────── */
    .password-strength {
      margin-top: 0.4rem;
      display: none;
    }

    .strength-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 0.3rem;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      transition: width 0.2s, background-color 0.2s;
    }

    .strength-text {
      font-size: 0.7rem;
      color: var(--ink-muted);
    }

    /* ── Error message ───────────────────────────────── */
    .error-message {
      display: none;
      background: #3a1a1a;
      border: 1px solid var(--red);
      color: var(--red);
      padding: .8rem .95rem;
      border-radius: var(--radius);
      font-size: .85rem;
      margin-bottom: 1.2rem;
    }

    .error-message.show {
      display: block;
    }

    /* ── Success message ──────────────────────────────── */
    .success-message {
      display: none;
      background: #1a3626;
      border: 1px solid var(--green);
      color: var(--green);
      padding: .8rem .95rem;
      border-radius: var(--radius);
      font-size: .85rem;
      margin-bottom: 1.2rem;
    }

    .success-message.show {
      display: block;
    }

    /* ── Submit button ───────────────────────────────── */
    .btn-submit {
      width: 100%;
      padding: .8rem 1.4rem;
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: .95rem;
      font-weight: 400;
      letter-spacing: .05em;
      cursor: pointer;
      border: 1px solid transparent;
      background: var(--accent);
      color: #0e0e0e;
      transition: all .15s;
      text-transform: uppercase;
    }

    .btn-submit:hover:not(:disabled) {
      background: #d4b87a;
    }

    .btn-submit:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    /* ── Footer text ──────────────────────────────────── */
    .signup-footer {
      margin-top: 1.8rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--ink-muted);
    }

    .signup-footer a {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      transition: color .2s;
    }

    .signup-footer a:hover {
      color: #d4b87a;
    }

    /* ── Loading spinner ──────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(232, 228, 220, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn-submit:disabled .spinner {
      display: inline-block;
      margin-right: .5rem;
    }

    /* ── Terms checkbox ───────────────────────────────── */
    .checkbox-group {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      margin-bottom: 1.2rem;
      font-size: 0.85rem;
    }

    .checkbox-group input[type="checkbox"] {
      width: auto;
      margin-top: 0.2rem;
      cursor: pointer;
    }

    .checkbox-group label {
      margin: 0;
      color: var(--ink-muted);
      cursor: pointer;
      font-size: 0.85rem;
      text-transform: none;
      letter-spacing: normal;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <div class="signup-header">
      <div class="logo">
        <span>KnowThisThings</span>
        <div class="logo-dot"></div>
      </div>
      <p>Create your account and start journaling</p>
    </div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <form id="signupForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          placeholder="Choose a unique username"
          autocomplete="username"
          minlength="3"
          maxlength="30"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">Email (optional)</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="your@email.com"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Create a strong password"
          autocomplete="new-password"
          minlength="6"
          required
        />
        <div class="password-strength" id="passwordStrength">
          <div class="strength-bar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <div class="strength-text" id="strengthText"></div>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input 
          type="password" 
          id="confirmPassword" 
          name="confirmPassword" 
          placeholder="Re-enter your password"
          autocomplete="new-password"
          required
        />
      </div>

      <div class="checkbox-group">
        <input 
          type="checkbox" 
          id="agreeTerms" 
          name="agreeTerms"
          required
        />
        <label for="agreeTerms">I agree to the terms and conditions</label>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        Create Account
      </button>
    </form>

    <div class="signup-footer">
      Already have an account? <a href="/login.html">Login here</a>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'http://localhost:8081/api';

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', function() {
      console.log('Signup form DOM loaded');

      // Password strength checker
      const passwordInput = document.getElementById('password');
      if (passwordInput) {
        passwordInput.addEventListener('input', function() {
          const password = this.value;
          const strengthText = document.getElementById('strengthText');
          const strengthFill = document.getElementById('strengthFill');
          const strength = calculatePasswordStrength(password);

          document.getElementById('passwordStrength').style.display = password ? 'block' : 'none';

          if (password.length === 0) {
            strengthFill.style.width = '0%';
          } else if (strength < 2) {
            strengthFill.style.width = '25%';
            strengthFill.style.backgroundColor = '#c0392b';
            strengthText.textContent = 'Weak';
          } else if (strength < 4) {
            strengthFill.style.width = '50%';
            strengthFill.style.backgroundColor = '#f39c12';
            strengthText.textContent = 'Fair';
          } else if (strength < 6) {
            strengthFill.style.width = '75%';
            strengthFill.style.backgroundColor = '#3498db';
            strengthText.textContent = 'Good';
          } else {
            strengthFill.style.width = '100%';
            strengthFill.style.backgroundColor = '#2ecc71';
            strengthText.textContent = 'Strong';
          }
        });
      }

      // Handle signup form submission
      const signupForm = document.getElementById('signupForm');
      if (signupForm) {
        signupForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          console.log('Signup form submitted');
          
          const username = document.getElementById('username').value.trim();
          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;
          const confirmPassword = document.getElementById('confirmPassword').value;
          const agreeTerms = document.getElementById('agreeTerms').checked;

          const errorMessage = document.getElementById('errorMessage');
          const successMessage = document.getElementById('successMessage');
          const submitBtn = document.getElementById('submitBtn');

          // Reset messages
          errorMessage.classList.remove('show');
          successMessage.classList.remove('show');
          errorMessage.textContent = '';
          successMessage.textContent = '';

          // Validate inputs
          if (!username || !password) {
            showError('Username and password are required');
            return;
          }

          if (username.length < 3) {
            showError('Username must be at least 3 characters');
            return;
          }

          if (password.length < 6) {
            showError('Password must be at least 6 characters');
            return;
          }

          if (password !== confirmPassword) {
            showError('Passwords do not match');
            return;
          }

          if (!agreeTerms) {
            showError('Please agree to the terms and conditions');
            return;
          }

          // Check if username already exists
          try {
            const checkResponse = await fetch(`${API_BASE_URL}/users/username/${username}`);
            if (checkResponse.ok) {
              showError('Username already exists. Please choose a different one');
              return;
            }
          } catch (error) {
            // Username doesn't exist, continue
          }

          // Disable submit button
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<span class="spinner"></span>Creating account...';

          try {
            // Create user
            const userResponse = await fetch(`${API_BASE_URL}/users`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                username,
                password,
                email: email || null
              })
            });

            if (!userResponse.ok) {
              let errorMsg = 'Failed to create account';
              try {
                const error = await userResponse.json();
                errorMsg = error.message || error.error || errorMsg;
              } catch (e) {
                // Use default error message
              }
              showError(errorMsg);
              submitBtn.disabled = false;
              submitBtn.textContent = 'Create Account';
              return;
            }

            const user = await userResponse.json();

            // Show success message
            showSuccess('Account created successfully! Redirecting to login...');

            // Redirect to login after 2 seconds
            setTimeout(() => {
              window.location.href = '/login.html';
            }, 2000);

          } catch (error) {
            console.error('Signup error:', error);
            showError('An error occurred during signup. Please try again.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Create Account';
          }
        });
      } else {
        console.error('Signup form not found!');
      }
    });

    function calculatePasswordStrength(password) {
      let strength = 0;
      if (password.length >= 8) strength++;
      if (password.length >= 12) strength++;
      if (/[a-z]/.test(password)) strength++;
      if (/[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^a-zA-Z0-9]/.test(password)) strength++;
      return strength;
    }

    // Show error message
    function showError(message) {
      const errorMessage = document.getElementById('errorMessage');
      errorMessage.textContent = message;
      errorMessage.classList.add('show');
      window.scrollTo(0, 0);
    }

    // Show success message
    function showSuccess(message) {
      const successMessage = document.getElementById('successMessage');
      successMessage.textContent = message;
      successMessage.classList.add('show');
      window.scrollTo(0, 0);
    }

    // Check if user is already logged in
    window.addEventListener('load', () => {
      const currentUser = localStorage.getItem('currentUser');
      if (currentUser) {
        window.location.href = '/index.html';
      }
      console.log('Signup form initialized');
    });
  </script>
</body>
</html>
